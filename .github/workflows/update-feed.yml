name: Update and deploy RSS feed

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "20 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feed
        run: >
          python journal_rss_aggregator.py
          --start-year 2020
          --end-year 2026
          --output feed.xml
          --feed-link https://fengziclassmate.github.io/journal-rss/feed.xml

      - name: Commit feed changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update RSS feed"
          file_pattern: feed.xml ijde.xml pattern-recognition.xml

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp feed.xml ijde.xml pattern-recognition.xml index.html .nojekyll _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
