name: Update RSS feed

on:
  workflow_dispatch:
  schedule:
    - cron: "20 22 * * *"

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feed
        run: >
          python journal_rss_aggregator.py
          --start-year 2020
          --end-year 2026
          --output feed.xml
          --feed-link https://fengziclassmate.github.io/journal-rss/feed.xml

      - name: Commit feed changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update RSS feed"
          file_pattern: feed.xml
